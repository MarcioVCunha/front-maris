<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Catálogo de Semijoias</title>

    <link rel="stylesheet" href="catalog.css">
    <script src="../env.js"></script>
    <script src="../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <header>
      <h1>Maris Semijoias</h1>
      <p>Catálogo</p>
    </header>

    <main>
      <!-- Lista de produtos renderizada pelo `catalog.js`. -->
      <div id="catalog" class="catalog"></div>

      <section id="unavailable-products-section" class="unavailable-products">
        <h2 class="unavailable-title">Produtos em falta</h2>
        <div id="unavailable-products-grid" class="catalog unavailable-catalog"></div>
      </section>
    </main>

    <div id="product-modal" class="product-modal" hidden>
      <div class="product-modal-backdrop" data-close-modal="true"></div>
      <div class="product-modal-content" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
        <button id="product-modal-close" class="product-modal-close" type="button" aria-label="Fechar">x</button>
        <img id="product-modal-image" class="product-modal-image" src="" alt="">
        <h3 id="product-modal-title"></h3>
        <div id="product-modal-code" class="modal-line"></div>
        <div id="product-modal-price" class="modal-line"></div>
        <div id="product-modal-stock" class="modal-line"></div>
        <div id="product-modal-status" class="modal-status"></div>
      </div>
    </div>

    <script src="catalog.js"></script>
  </body>
</html>
