<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Catálogo de Semijoias</title>

    <link rel="stylesheet" href="catalog.css">
    <script src="../env.js"></script>
    <script src="../utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>

  <body>
    <header>
      <h1>Maris Semijoias</h1>
      <p>Catálogo</p>
    </header>

    <main>
      <!-- Lista de produtos renderizada pelo `catalog.js`. -->
      <div id="catalog" class="catalog"></div>

      <section id="unavailable-products-section" class="unavailable-products">
        <h2 class="unavailable-title">
          Produtos indisponíveis
          <span id="unavailable-count" class="unavailable-count">(0)</span>
        </h2>
        <div id="unavailable-products-grid" class="catalog unavailable-catalog"></div>
      </section>
    </main>

    <script src="catalog.js"></script>
  </body>
</html>
